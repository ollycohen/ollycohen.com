name: Update GitHub Stats

on:
  schedule:
    - cron: '23 6 * * *' # 6:23 AM UTC daily (off-minute to reduce fleet contention)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Fetch GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_GITHUB_TOKEN }}
        run: node scripts/fetch-github-stats.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/github-stats.json
          git diff --staged --quiet || git commit -m "chore: update github stats"
          git push
