<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure — Olly Cohen</title>
  <meta name="description" content="Olly Cohen's running adventures across every continent.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">olly cohen</a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <div class="nav__links" id="navLinks">
      <a href="/adventures/">Adventures</a>
      <a href="/adventure/?slug=andes">Andes</a>
      <a href="/engineering/">Engineering</a>
      <a href="/blog/">Blog</a>
      <a href="/impact/">Impact</a>
      <a href="/sponsors/">Sponsors</a>
    </div>
  </nav>

  <header class="page-header" style="padding-bottom: var(--space-xl);">
    <div class="container">
      <p class="page-header__eyebrow" id="adventureEyebrow"></p>
      <h1 class="page-header__title" id="adventureTitle">Loading...</h1>
      <p class="page-header__desc" id="adventureDesc"></p>
    </div>
  </header>

  <!-- Text sections + Map (cover image renders at the top of the container) -->
  <section class="page-content" id="adventureContent" style="padding-bottom: var(--space-xl); display: none;">
    <div class="container">
      <figure class="adventure-cover" id="adventureCover" style="display: none;">
        <img id="adventureCoverImg" alt="" loading="eager">
      </figure>
      <div class="adventure-layout">
        <div class="adventure-layout__text" id="adventureText"></div>
        <div id="adventureMapContainer" style="display: none;">
          <h2 style="font-family: var(--f-display); font-size: 1.5rem; margin-bottom: var(--space-md);">Route Map</h2>
          <div class="adventure-maps" id="adventureMaps"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Gallery -->
  <section class="section" id="gallerySection" style="display: none;">
    <div class="container">
      <span class="section__label">Gallery</span>
      <h2 class="section__heading" id="galleryHeading">Photos & Videos</h2>
      <div class="gallery__grid" id="galleryGrid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><div class="footer__bottom"><p>&copy; 2026 Olly Cohen. Built with Claude.</p></div></div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  (async function () {
    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    var slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) { window.location.href = '/adventures/'; return; }

    try {
      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Fetch adventure (required) — try full columns, fallback to base if new columns not migrated
      var advRes = await sb.from('adventures')
        .select('*')
        .eq('slug', slug)
        .single();

      if (advRes.error || !advRes.data) {
        console.error('Adventure query error:', JSON.stringify(advRes.error));
        window.location.href = '/adventures/';
        return;
      }

      // Sections, media, and maps are optional (tables may not exist yet)
      var sectRes = { data: [] };
      var mediaRes = { data: [] };
      var mapsRes = { data: [] };
      try {
        var results = await Promise.all([
          sb.from('adventure_sections')
            .select('heading,paragraphs,link_url,link_label')
            .eq('adventure_slug', slug)
            .order('sort_order'),
          sb.from('adventure_media')
            .select('type,title,thumbnail_path,youtube_id,taken_date')
            .eq('adventure_slug', slug)
            .order('taken_date', { ascending: false }),
          sb.from('adventure_maps')
            .select('label,map_url,start_date,end_date')
            .eq('adventure_slug', slug)
            .order('sort_order')
        ]);
        if (!results[0].error) sectRes = results[0];
        if (!results[1].error) mediaRes = results[1];
        if (!results[2].error) mapsRes = results[2];
      } catch (e) { /* tables may not exist yet */ }

      var adv = advRes.data;

      // Page title & meta
      document.title = adv.continent + ': ' + adv.title + ' — Olly Cohen';
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.content = adv.description;

      // Header
      document.getElementById('adventureEyebrow').textContent = adv.eyebrow || adv.date_range;
      document.getElementById('adventureTitle').textContent = adv.continent + ': ' + adv.title;
      document.getElementById('adventureDesc').textContent = adv.subtitle || adv.description;

      // Split media into cover + gallery. Cover is a row with title='Cover'
      // (convention — keeps schema flat, no extra column needed).
      var allMedia = mediaRes.data || [];
      var coverItem = null;
      var media = [];
      allMedia.forEach(function (item) {
        if (!coverItem && item.type === 'image' && item.title === 'Cover') {
          coverItem = item;
        } else {
          media.push(item);
        }
      });

      // Cover image
      if (coverItem) {
        document.getElementById('adventureCoverImg').src = coverItem.thumbnail_path;
        document.getElementById('adventureCoverImg').alt = adv.continent + ' — ' + adv.title;
        document.getElementById('adventureCover').style.display = '';
      }

      // Sections + Maps
      var sections = sectRes.data || [];
      var maps = mapsRes.data || [];
      // Fallback: if adventure_maps table has no rows, use map_url from adventures
      if (maps.length === 0 && adv.map_url) {
        maps = [{ label: 'Route Map', map_url: adv.map_url }];
      }
      var hasContent = sections.length > 0 || maps.length > 0 || coverItem;

      if (hasContent) {
        document.getElementById('adventureContent').style.display = '';

        // Text sections
        var textEl = document.getElementById('adventureText');
        sections.forEach(function (sec) {
          if (sec.heading) {
            var h = document.createElement('h2');
            h.style.fontFamily = 'var(--f-display)';
            h.style.fontSize = '1.5rem';
            h.style.marginBottom = 'var(--space-sm)';
            h.style.marginTop = 'var(--space-md)';
            h.style.color = 'var(--c-text)';
            h.textContent = sec.heading;
            textEl.appendChild(h);
          }
          var paras = sec.paragraphs || [];
          paras.forEach(function (p) {
            var pEl = document.createElement('p');
            pEl.textContent = p;
            textEl.appendChild(pEl);
          });
          if (sec.link_url && sec.link_label) {
            var a = document.createElement('a');
            a.href = sec.link_url;
            a.target = '_blank';
            a.className = 'btn btn--primary';
            a.style.marginTop = 'var(--space-sm)';
            a.style.display = 'inline-block';
            a.textContent = sec.link_label;
            textEl.appendChild(a);
          }
        });

        // Maps
        if (maps.length > 0) {
          document.getElementById('adventureMapContainer').style.display = '';
          var mapsGrid = document.getElementById('adventureMaps');
          var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
          function fmtDateRange(startStr, endStr) {
            // Both YYYY-MM-DD strings from a Postgres `date` column.
            if (!startStr || !endStr) return '';
            var s = startStr.split('-'), e = endStr.split('-');
            var sY = parseInt(s[0], 10), sM = MONTHS[parseInt(s[1], 10) - 1], sD = parseInt(s[2], 10);
            var eY = parseInt(e[0], 10), eM = MONTHS[parseInt(e[1], 10) - 1], eD = parseInt(e[2], 10);
            if (sY === eY) {
              return sM + ' ' + sD + ' — ' + eM + ' ' + eD + ', ' + eY;
            }
            return sM + ' ' + sD + ', ' + sY + ' — ' + eM + ' ' + eD + ', ' + eY;
          }
          maps.forEach(function (m) {
            var wrapper = document.createElement('div');
            if (maps.length > 1) {
              var label = document.createElement('p');
              label.className = 'adventure-maps__label';
              label.textContent = m.label;
              wrapper.appendChild(label);
            }
            var dateText = fmtDateRange(m.start_date, m.end_date);
            if (dateText) {
              var dateEl = document.createElement('p');
              dateEl.className = 'adventure-maps__date';
              dateEl.textContent = dateText;
              wrapper.appendChild(dateEl);
            }
            var iframe = document.createElement('iframe');
            iframe.src = m.map_url;
            iframe.width = '100%';
            iframe.height = '600';
            iframe.setAttribute('loading', 'lazy');
            wrapper.appendChild(iframe);
            mapsGrid.appendChild(wrapper);
          });
        }
      }

      // Gallery (cover already filtered out above)
      if (media.length > 0) {
        document.getElementById('gallerySection').style.display = '';
        var grid = document.getElementById('galleryGrid');

        media.forEach(function (item) {
          var div = document.createElement('div');
          div.className = 'gallery__item' + (item.type === 'video' ? ' gallery__item--video' : '');

          var img = document.createElement('img');
          img.src = item.thumbnail_path;
          img.alt = item.title || '';
          img.loading = 'lazy';
          div.appendChild(img);

          if (item.type === 'video' && item.youtube_id) {
            div.addEventListener('click', function () { openVideoModal(item.youtube_id); });
          }

          grid.appendChild(div);
        });
      }

    } catch (err) {
      console.error('Adventure load error:', err);
    }
  })();
  </script>
</body>
</html>
