      <div class="blog-list" id="blogList">
        <!-- Rows rendered synchronously by the script below from baked-in BLOG_POSTS -->
      </div>

      <p id="substackLink" style="margin-top: var(--space-lg); text-align: center;">
        <a href="https://irunearth.substack.com" target="_blank" class="btn btn--primary">Read All Posts on Substack →</a>
      </p>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><div class="footer__bottom"><p>&copy; 2026 Olly Cohen. Built with Claude.</p></div></div>
  </footer>
  <script src="/js/main.js"></script>
  <script src="/js/config.js"></script>
  <script>
    // Substack tag mapping per category (slug used in irunearth.substack.com/t/<slug>)
    const SUBSTACK_TAGS = {
      'all': '',
      'tech': 'ai',
      'north-america': 'north-america',
      'africa': 'africa',
      'asia': 'asia',
      'personal': 'personal'
    };

    // Display names for the Substack button per category
    const SECTION_NAMES = {
      'all': '',
      'tech': 'Tech',
      'north-america': 'North America',
      'africa': 'Africa',
      'asia': 'Asia',
      'personal': 'Life and Writing'
    };

    // Format a date string (YYYY-MM-DD) as "Mon YYYY"
    function formatDate(dateStr) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const parts = dateStr.split('-');
      return months[parseInt(parts[1], 10) - 1] + ' ' + parts[0];
    }

    // Render posts into #blogList (sorted by date descending)
    function renderPosts(filter) {
      const list = document.getElementById('blogList');
      list.innerHTML = '';
      const sorted = BLOG_POSTS.slice().sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach(post => {
        const a = document.createElement('a');
        a.href = post.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'blog-table__row';
        a.dataset.cat = post.category;
        if (filter !== 'all' && post.category !== filter) a.dataset.hidden = 'true';

        const dateSpan = document.createElement('span');
        dateSpan.className = 'blog-table__date';
        dateSpan.textContent = formatDate(post.date);

        const titleSpan = document.createElement('span');
        titleSpan.className = 'blog-table__title';
        titleSpan.textContent = post.title;

        a.appendChild(dateSpan);
        a.appendChild(titleSpan);
        list.appendChild(a);
      });

      // Update Substack link for active section
      updateSubstackLink(filter);
    }

    // Update the Substack link based on active filter
    function updateSubstackLink(filter) {
      const linkContainer = document.getElementById('substackLink');
      const tag = SUBSTACK_TAGS[filter] || '';
      const sectionName = SECTION_NAMES[filter] || '';
      const url = tag
        ? 'https://irunearth.substack.com/t/' + tag
        : 'https://irunearth.substack.com';
      const label = sectionName
        ? 'Read all ' + sectionName + ' posts on Substack →'
        : 'Read all posts on Substack →';
      linkContainer.innerHTML = '<a href="' + url + '" target="_blank" class="btn btn--primary">' + label + '</a>';
    }

    // Render immediately with baked data
    renderPosts('all');

    // Fetch fresh data from Supabase and re-render
    (function fetchPosts() {
      var url = SUPABASE_URL + '/rest/v1/blog_posts?select=title,url,category,tag,date&order=date.desc';
      fetch(url, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        }
      })
      .then(function(res) { return res.json(); })
      .then(function(posts) {
        if (Array.isArray(posts) && posts.length > 0) {
          BLOG_POSTS = posts;
          // Re-render with current active filter
          var activeBtn = document.querySelector('.blog-filter__btn.active');
          var currentFilter = activeBtn ? activeBtn.dataset.filter : 'all';
          renderPosts(currentFilter);
        }
      })
      .catch(function() { /* baked data already rendered, silent fallback */ });
    })();

    document.querySelectorAll('.blog-filter__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.blog-filter__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPosts(btn.dataset.filter);
      });
    });
  </script>
