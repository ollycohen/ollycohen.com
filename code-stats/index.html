<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Activity — Olly Cohen</title>
  <meta name="description" content="Daily contribution stats and code activity across the APM Steam codebase.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">olly cohen</a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <div class="nav__links" id="navLinks">
      <a href="/adventures/">Adventures</a>
      <a href="/andes/">Andes</a>
      <a href="/engineering/">Engineering</a>
      <a href="/code-stats/">Code</a>
      <a href="/blog/">Blog</a>
      <a href="/impact/">Impact</a>
      <a href="/sponsors/">Sponsors</a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <p class="page-header__eyebrow">Engineering</p>
      <h1 class="page-header__title">Code Activity</h1>
      <p class="page-header__desc">Daily contribution stats across the APM Steam codebase. Updated daily via GitHub Actions.</p>
    </div>
  </header>

  <!-- Charts -->
  <section class="section">
    <div class="container">
      <h2 class="section__heading">Commits & Lines of Code</h2>
      <p class="chart-footnote" id="chartFootnote"></p>
      <div class="chart-stack">
        <div class="chart-container chart-container--full">
          <canvas id="commitsChart"></canvas>
        </div>
        <div class="chart-container chart-container--full">
          <canvas id="locChart"></canvas>
        </div>
      </div>
    </div>
  </section>

  <!-- Per-Repo Breakdown -->
  <section class="section">
    <div class="container">
      <p class="section__label">Repositories</p>
      <h2 class="section__heading">Per-Repo Breakdown</h2>
      <div class="chart-stack" id="repoCharts"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p id="lastUpdated" style="color: var(--c-text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;"></p>
        <p>&copy; 2026 Olly Cohen. Built with Claude.</p>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
  (async function () {
    var REPO_COLORS = {
      'apm-steam-mobile': '#6aad6a',
      'apm-steam-web': '#c8945a',
      'apm-steam-api': '#6a8aad',
      'apm-steam-azure-functions': '#ad6a8a'
    };
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var data;
    try {
      var res = await fetch('/data/github-stats.json');
      if (!res.ok) throw new Error('not found');
      data = await res.json();
    } catch (e) { return; }

    // Remove known noisy dates (bulk lock-file / generated-code commits)
    ['2025-08-11', '2025-08-12', '2025-08-13'].forEach(function(d) { delete data.daily[d]; });

    // Footnote
    var user = data.username || 'OllyCohen';
    var repoCount = data.repos_scanned ? data.repos_scanned.length : 0;
    document.getElementById('chartFootnote').textContent =
      'All commits and lines of code by ' + user + ' across ' + repoCount + ' repositories on GitHub.';

    renderCommitsChart(data);
    renderLocChart(data);
    renderRepoCharts(data);

    var d = new Date(data.generated_at);
    document.getElementById('lastUpdated').textContent =
      'Last updated ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    /* ── helpers ── */

    function getDates(data) {
      var dates = [];
      var cur = new Date(data.date_range.start + 'T00:00:00');
      var end = new Date(data.date_range.end + 'T00:00:00');
      while (cur <= end) {
        dates.push(cur.toISOString().split('T')[0]);
        cur.setDate(cur.getDate() + 1);
      }
      return dates;
    }

    function getMonthKeys(data) {
      var start = new Date(data.date_range.start + 'T00:00:00');
      var end = new Date(data.date_range.end + 'T00:00:00');
      var keys = [];
      var cur = new Date(start.getFullYear(), start.getMonth(), 1);
      while (cur <= end) {
        var y = cur.getFullYear();
        var m = cur.getMonth();
        keys.push(y + '-' + String(m + 1).padStart(2, '0'));
        cur.setMonth(cur.getMonth() + 1);
      }
      return keys;
    }

    function monthLabel(key) {
      var parts = key.split('-');
      var month = parseInt(parts[1], 10);
      if (month === 1) return parts[0];
      return MONTHS[month - 1];
    }

    function aggregateMonthlyRepo(data, repoName) {
      var months = {};
      Object.keys(data.daily).forEach(function(date) {
        var day = data.daily[date];
        var repo = day.by_repo && day.by_repo[repoName];
        if (!repo) return;
        var key = date.substring(0, 7); // YYYY-MM
        if (!months[key]) months[key] = { commits: 0, additions: 0 };
        months[key].commits += repo.commits;
        months[key].additions += repo.additions;
      });
      return months;
    }

    /* ── x-axis for daily charts ── */

    function monthTickCallback(value) {
      var label = this.getLabelForValue(value);
      if (typeof label !== 'string') return null;
      var parts = label.split('-');
      if (parts.length < 3) return null;
      if (parseInt(parts[2], 10) !== 1) return null;
      var month = parseInt(parts[1], 10);
      if (month === 1) return parts[0];
      return MONTHS[month - 1];
    }

    function dailyXAxis(stacked) {
      return {
        stacked: stacked || false,
        ticks: {
          autoSkip: false, maxRotation: 0,
          callback: monthTickCallback,
          color: function(ctx) {
            var l = ctx.tick && ctx.tick.label;
            return /^\d{4}$/.test(l) ? '#ece8df' : '#8a8477';
          },
          font: function(ctx) {
            var l = ctx.tick && ctx.tick.label;
            var yr = /^\d{4}$/.test(l);
            return { size: yr ? 13 : 11, weight: yr ? 'bold' : 'normal', family: "'JetBrains Mono', monospace" };
          }
        },
        grid: { color: 'rgba(255,255,255,0.04)' }
      };
    }

    /* ── shared chart options ── */

    var tooltipStyle = {
      backgroundColor: '#1a1f16', titleColor: '#ece8df', bodyColor: '#8a8477',
      borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
      titleFont: { family: "'JetBrains Mono', monospace", size: 12 },
      bodyFont: { family: "'JetBrains Mono', monospace", size: 11 }
    };

    function chartOptions(title) {
      return {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: true, labels: { color: '#8a8477', font: { family: "'JetBrains Mono', monospace", size: 11 }, boxWidth: 12 } },
          title: { display: true, text: title, color: '#ece8df', font: { family: "'JetBrains Mono', monospace", size: 13, weight: '400' }, padding: { bottom: 12 } },
          tooltip: tooltipStyle
        },
        scales: {
          x: dailyXAxis(),
          y: { ticks: { color: '#8a8477', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true }
        }
      };
    }

    /* ── daily charts ── */

    function renderCommitsChart(data) {
      var dates = getDates(data);
      var commits = dates.map(function(d) { return data.daily[d] ? data.daily[d].commits : 0; });
      new Chart(document.getElementById('commitsChart'), {
        type: 'line',
        data: { labels: dates, datasets: [{ label: 'Commits', data: commits, borderColor: '#6aad6a', backgroundColor: 'rgba(106,173,106,0.08)', fill: true, tension: 0.3, pointRadius: 0, pointHitRadius: 10, borderWidth: 2 }] },
        options: chartOptions('Daily Commits')
      });
    }

    function renderLocChart(data) {
      var dates = getDates(data);
      var additions = dates.map(function(d) { return data.daily[d] ? data.daily[d].additions : 0; });
      var deletions = dates.map(function(d) { return data.daily[d] ? -(data.daily[d].deletions) : 0; });
      var opts = chartOptions('Daily Lines of Code');
      opts.scales.x = dailyXAxis(true);
      opts.scales.y = { stacked: true, ticks: { color: '#8a8477', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } };
      new Chart(document.getElementById('locChart'), {
        type: 'bar',
        data: { labels: dates, datasets: [
          { label: 'Additions', data: additions, backgroundColor: 'rgba(106,173,106,0.6)', borderColor: '#6aad6a', borderWidth: 1 },
          { label: 'Deletions', data: deletions, backgroundColor: 'rgba(200,100,100,0.5)', borderColor: '#c86464', borderWidth: 1 }
        ] },
        options: opts
      });
    }

    /* ── per-repo monthly charts ── */

    function renderRepoCharts(data) {
      var container = document.getElementById('repoCharts');
      var monthKeys = getMonthKeys(data);
      var labels = monthKeys.map(monthLabel);
      var FEATURED = ['apm-steam-mobile', 'apm-steam-web', 'apm-steam-api', 'apm-steam-azure-functions', 'ollycohen.com'];
      var repos = Object.entries(data.by_repo)
        .filter(function(entry) { return FEATURED.indexOf(entry[0]) !== -1; })
        .sort(function(a, b) { return b[1].commits - a[1].commits; });

      repos.forEach(function(entry) {
        var name = entry[0];
        var color = REPO_COLORS[name] || '#6aad6a';
        var monthly = aggregateMonthlyRepo(data, name);

        var commitData = monthKeys.map(function(k) { return monthly[k] ? monthly[k].commits : 0; });
        var locData = monthKeys.map(function(k) { return monthly[k] ? monthly[k].additions : 0; });

        var wrap = document.createElement('div');
        wrap.className = 'chart-container chart-container--full';
        var canvas = document.createElement('canvas');
        wrap.appendChild(canvas);
        container.appendChild(wrap);

        new Chart(canvas, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [
              { label: 'Commits', data: commitData, backgroundColor: color + 'cc', borderColor: color, borderWidth: 1, yAxisID: 'y' },
              { label: 'Lines added', data: locData, backgroundColor: 'rgba(236,232,223,0.15)', borderColor: 'rgba(236,232,223,0.4)', borderWidth: 1, yAxisID: 'y1' }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              title: { display: true, text: name, color: color, font: { family: "'JetBrains Mono', monospace", size: 14, weight: '500' }, padding: { bottom: 8 } },
              legend: { display: true, labels: { color: '#8a8477', font: { family: "'JetBrains Mono', monospace", size: 11 }, boxWidth: 12 } },
              tooltip: tooltipStyle
            },
            scales: {
              x: {
                ticks: {
                  color: function(ctx) { return /^\d{4}$/.test(labels[ctx.index]) ? '#ece8df' : '#8a8477'; },
                  font: function(ctx) {
                    var yr = /^\d{4}$/.test(labels[ctx.index]);
                    return { size: yr ? 13 : 11, weight: yr ? 'bold' : 'normal', family: "'JetBrains Mono', monospace" };
                  },
                  maxRotation: 0
                },
                grid: { color: 'rgba(255,255,255,0.04)' }
              },
              y: {
                position: 'left', beginAtZero: true,
                title: { display: true, text: 'Commits', color: '#8a8477', font: { family: "'JetBrains Mono', monospace", size: 10 } },
                ticks: { color: '#8a8477', font: { size: 11 } },
                grid: { color: 'rgba(255,255,255,0.04)' }
              },
              y1: {
                position: 'right', beginAtZero: true,
                title: { display: true, text: 'Lines', color: '#8a8477', font: { family: "'JetBrains Mono', monospace", size: 10 } },
                ticks: { color: '#8a8477', font: { size: 11 } },
                grid: { drawOnChartArea: false }
              }
            }
          }
        });
      });
    }
  })();
  </script>
</body>
</html>
