  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .blog-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: var(--space-lg); }
    .blog-filter__btn {
      font-family: var(--f-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--c-text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .blog-filter__btn:hover, .blog-filter__btn.active {
      border-color: var(--c-accent);
      color: var(--c-accent);
      background: rgba(125,184,125,0.08);
    }

    /* Blog table */
    .blog-table {
      width: 100%;
      border-collapse: collapse;
    }
    .blog-table__row {
      display: flex;
      align-items: baseline;
      gap: var(--space-md);
      border-bottom: 1px solid var(--c-border);
      text-decoration: none;
      color: inherit;
      padding: 0.85rem 0;
      cursor: pointer;
      transition: background var(--transition);
    }
    .blog-table__row:first-child {
      border-top: 1px solid var(--c-border);
    }
    .blog-table__row[data-hidden="true"] { display: none; }
    .blog-table__date {
      font-family: var(--f-mono);
      font-size: 0.8rem;
      color: var(--c-text-muted);
      white-space: nowrap;
      width: 90px;
      flex-shrink: 0;
    }
    .blog-table__title {
      color: var(--c-text);
      font-family: var(--f-body);
      font-size: 1rem;
      transition: color var(--transition);
    }
    .blog-table__row:hover .blog-table__title {
      color: var(--c-accent);
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">olly cohen</a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <div class="nav__links" id="navLinks">
      <a href="/pages/adventures.html">Adventures</a>
      <a href="/pages/andes.html">Andes</a>
      <a href="/pages/engineering.html">Engineering</a>

        <button class="blog-filter__btn" data-filter="africa">Africa Run</button>

        <button class="blog-filter__btn" data-filter="personal">Personal</button>

      <div class="blog-list" id="blogList">
        <!-- Rows rendered synchronously by the script below from baked-in BLOG_POSTS -->
      </div>

      <p style="margin-top: var(--space-lg); text-align: center;">
        <a href="https://irunearth.substack.com" target="_blank" class="btn btn--primary">Read All Posts on Substack →</a>

  </footer>
  <script src="/js/main.js"></script>
  <script>
    // Format a date string (YYYY-MM-DD) as "Mon YYYY"
    function formatDate(dateStr) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const parts = dateStr.split('-');
      return months[parseInt(parts[1], 10) - 1] + ' ' + parts[0];
    }

    // Render posts into #blogList
    function renderPosts(filter) {
      const list = document.getElementById('blogList');
      list.innerHTML = '';
      BLOG_POSTS.forEach(post => {
        const a = document.createElement('a');
        a.href = post.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'blog-table__row';
        a.dataset.cat = post.category;
        if (filter !== 'all' && post.category !== filter) a.dataset.hidden = 'true';

        const dateSpan = document.createElement('span');
        dateSpan.className = 'blog-table__date';
        dateSpan.textContent = formatDate(post.date);

        const titleSpan = document.createElement('span');
        titleSpan.className = 'blog-table__title';
        titleSpan.textContent = post.title;

        a.appendChild(dateSpan);
        a.appendChild(titleSpan);
        list.appendChild(a);
      });
    }

    renderPosts('all');

    document.querySelectorAll('.blog-filter__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.blog-filter__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPosts(btn.dataset.filter);
      });
    });
  </script>
</body>
</html>
