<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Olly Cohen</title>
  <meta name="description" content="Olly Cohen's blog archive. Writing on tech, running adventures across continents, and personal reflections.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .blog-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: var(--space-lg); }
    .blog-filter__btn {
      font-family: var(--f-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--c-text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .blog-filter__btn:hover, .blog-filter__btn.active {
      border-color: var(--c-accent);
      color: var(--c-accent);
      background: rgba(125,184,125,0.08);
    }
    .blog-list__item[data-hidden="true"] { display: none; }
  </style>
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">olly cohen</a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <div class="nav__links" id="navLinks">
      <a href="/pages/adventures.html">Adventures</a>
      <a href="/pages/andes.html">Andes FKT</a>
      <a href="/pages/engineering.html">Engineering</a>
      <a href="/pages/blog.html">Blog</a>
      <a href="/pages/impact.html">Impact</a>
      <a href="/pages/sponsors.html">Sponsors</a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <p class="page-header__eyebrow">I Run Earth</p>
      <h1 class="page-header__title">Blog</h1>
      <p class="page-header__desc">Adventure reports, tech essays, and personal reflections. All posts live on <a href="https://irunearth.substack.com" target="_blank" style="color: var(--c-accent);">Substack</a>.</p>
    </div>
  </header>

  <section class="page-content">
    <div class="container">

      <div class="blog-filter" id="blogFilter">
        <button class="blog-filter__btn active" data-filter="all">All</button>
      </div>

      <div class="blog-list" id="blogList">
        <p id="blogLoading" style="color: var(--c-text-muted); font-family: var(--f-mono); font-size: 0.85rem;">Loading posts…</p>
      </div>

      <p style="margin-top: var(--space-lg); text-align: center;">
        <a href="https://irunearth.substack.com" target="_blank" class="btn btn--primary">Read All Posts on Substack →</a>
      </p>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><div class="footer__bottom"><p>&copy; 2026 Olly Cohen. Built with Claude.</p></div></div>
  </footer>
  <script src="/js/main.js"></script>
  <script src="/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (async function () {
      const blogList = document.getElementById('blogList');
      const blogFilter = document.getElementById('blogFilter');
      const loading = document.getElementById('blogLoading');

      // Category display labels for filter buttons
      const CATEGORY_LABELS = {
        'tech': 'Tech',
        'north-america': 'North America Run',
        'africa': 'Africa Run',
        'asia': 'Asia Run',
        'personal': 'Personal'
      };

      // Format date as "Mon YYYY"
      function formatDate(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      }

      // Render blog posts into the list
      function renderPosts(posts) {
        // Remove loading indicator
        if (loading) loading.remove();

        // Clear existing posts
        blogList.querySelectorAll('.blog-list__item').forEach(el => el.remove());

        posts.forEach(post => {
          const a = document.createElement('a');
          a.href = post.url;
          a.target = '_blank';
          a.className = 'blog-list__item';
          a.dataset.cat = post.category;

          a.innerHTML =
            '<span class="blog-list__tag">' + escapeHtml(post.tag) + '</span>' +
            '<span class="blog-list__title">' + escapeHtml(post.title) + '</span>' +
            '<span class="blog-list__date">' + formatDate(post.date) + '</span>';

          blogList.appendChild(a);
        });

        // Re-init scroll reveal for new items
        initReveal();
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // Build filter buttons from categories found in data
      function buildFilters(posts) {
        const categories = [...new Set(posts.map(p => p.category))];

        // Sort categories in a logical order
        const ORDER = ['tech', 'north-america', 'africa', 'asia', 'personal'];
        categories.sort((a, b) => (ORDER.indexOf(a) === -1 ? 99 : ORDER.indexOf(a)) - (ORDER.indexOf(b) === -1 ? 99 : ORDER.indexOf(b)));

        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'blog-filter__btn';
          btn.dataset.filter = cat;
          btn.textContent = CATEGORY_LABELS[cat] || cat;
          blogFilter.appendChild(btn);
        });

        // Wire up all filter buttons (including the "All" button already in HTML)
        blogFilter.querySelectorAll('.blog-filter__btn').forEach(btn => {
          btn.addEventListener('click', () => {
            blogFilter.querySelectorAll('.blog-filter__btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.dataset.filter;
            blogList.querySelectorAll('.blog-list__item').forEach(item => {
              if (filter === 'all' || item.dataset.cat === filter) {
                item.setAttribute('data-hidden', 'false');
                item.style.display = '';
              } else {
                item.setAttribute('data-hidden', 'true');
                item.style.display = 'none';
              }
            });
          });
        });
      }

      // Re-initialize scroll reveal for dynamically added items
      function initReveal() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.style.opacity = '1';
              entry.target.style.transform = 'translateY(0)';
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        blogList.querySelectorAll('.blog-list__item').forEach((el, i) => {
          el.style.opacity = '0';
          el.style.transform = 'translateY(20px)';
          el.style.transition = 'opacity 0.6s ease ' + (i * 0.02) + 's, transform 0.6s ease ' + (i * 0.02) + 's';
          observer.observe(el);
        });
      }

      // Fetch from Supabase
      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: posts, error } = await supabase
          .from('blog_posts')
          .select('title, url, category, tag, date')
          .order('date', { ascending: false });

        if (error) throw error;

        buildFilters(posts);
        renderPosts(posts);
      } catch (err) {
        console.error('Failed to load blog posts:', err);
        if (loading) loading.textContent = 'Failed to load posts. Please try again later.';
      }
    })();
  </script>
</body>
</html>
