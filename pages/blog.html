<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Olly Cohen</title>
  <meta name="description" content="Olly Cohen's blog archive. Writing on tech, running adventures across continents, and personal reflections.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .blog-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: var(--space-lg); }
    .blog-filter__btn {
      font-family: var(--f-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--c-text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .blog-filter__btn:hover, .blog-filter__btn.active {
      border-color: var(--c-accent);
      color: var(--c-accent);
      background: rgba(125,184,125,0.08);
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">olly cohen</a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <div class="nav__links" id="navLinks">
      <a href="/pages/adventures.html">Adventures</a>
      <a href="/pages/andes.html">South America</a>
      <a href="/pages/engineering.html">Engineering</a>
      <a href="/pages/blog.html">Blog</a>
      <a href="/pages/impact.html">Impact</a>
      <a href="/pages/sponsors.html">Sponsors</a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <p class="page-header__eyebrow">I Run Earth</p>
      <h1 class="page-header__title">Blog</h1>
      <p class="page-header__desc">Adventure reports, tech essays, and personal reflections. All posts live on <a href="https://irunearth.substack.com" target="_blank" style="color: var(--c-accent);">Substack</a>.</p>
    </div>
  </header>

  <section class="page-content">
    <div class="container">

      <div class="blog-filter">
        <button class="blog-filter__btn active" data-filter="all">All</button>
        <button class="blog-filter__btn" data-filter="tech">Tech</button>
        <button class="blog-filter__btn" data-filter="north-america">North America Run</button>
        <button class="blog-filter__btn" data-filter="africa">Africa Run</button>
        <button class="blog-filter__btn" data-filter="asia">Asia Run</button>
        <button class="blog-filter__btn" data-filter="personal">Personal</button>
      </div>

      <div class="blog-list" id="blogList">
        <p id="blogLoading" style="color:var(--c-text-muted);font-family:var(--f-mono);font-size:0.85rem;">Loading posts…</p>
      </div>

      <p style="margin-top: var(--space-lg); text-align: center;">
        <a href="https://irunearth.substack.com" target="_blank" class="btn btn--primary">Read All Posts on Substack →</a>
      </p>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><div class="footer__bottom"><p>&copy; 2026 Olly Cohen. Built with Claude.</p></div></div>
  </footer>
  <script src="/js/main.js"></script>
  <script src="/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  (async function () {
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function fmtDate(ds) {
      const [y, m] = ds.split('-');
      return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m) - 1] + ' ' + y;
    }

    const list = document.getElementById('blogList');
    let currentFilter = 'all';
    let allItems = [];

    function renderItems() {
      // Remove all existing .blog-list__item elements
      list.querySelectorAll('.blog-list__item').forEach(el => el.remove());
      allItems.forEach(({ el, cat }) => {
        if (currentFilter === 'all' || cat === currentFilter) {
          list.appendChild(el);
        }
      });
    }

    // Wire up filter buttons
    document.querySelectorAll('.blog-filter__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.blog-filter__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderItems();
      });
    });

    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data, error } = await sb
        .from('blog_posts')
        .select('title,url,category,tag,date')
        .order('date', { ascending: false });

      document.getElementById('blogLoading')?.remove();
      if (error) throw error;

      (data || []).forEach(post => {
        const a = document.createElement('a');
        a.href = post.url;
        a.target = '_blank';
        a.className = 'blog-list__item';
        a.innerHTML =
          '<span class="blog-list__tag">' + esc(post.tag) + '</span>' +
          '<span class="blog-list__title">' + esc(post.title) + '</span>' +
          '<span class="blog-list__date">' + fmtDate(post.date) + '</span>';
        allItems.push({ el: a, cat: post.category });
      });

      renderItems();
    } catch (err) {
      console.error('Failed to load blog posts:', err);
      const loading = document.getElementById('blogLoading');
      if (loading) loading.textContent = 'Failed to load posts.';
    }
  })();
  </script>
</body>
</html>
