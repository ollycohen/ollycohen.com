<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Activity — Olly Cohen</title>
  <meta name="description" content="Daily contribution stats and code activity across the APM Steam codebase.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">olly cohen</a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <div class="nav__links" id="navLinks">
      <a href="/pages/adventures.html">Adventures</a>
      <a href="/pages/andes.html">Andes</a>
      <a href="/pages/engineering.html">Engineering</a>
      <a href="/pages/code-stats.html">Code</a>
      <a href="/pages/blog.html">Blog</a>
      <a href="/pages/impact.html">Impact</a>
      <a href="/pages/sponsors.html">Sponsors</a>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <p class="page-header__eyebrow">Engineering</p>
      <h1 class="page-header__title">Code Activity</h1>
      <p class="page-header__desc">Daily contribution stats across the APM Steam codebase. Updated daily via GitHub Actions.</p>
    </div>
  </header>

  <!-- Charts -->
  <section class="section">
    <div class="container">
      <p class="section__label">Trends</p>
      <h2 class="section__heading">Commits & Lines of Code</h2>
      <div class="chart-stack">
        <div class="chart-container chart-container--full">
          <canvas id="commitsChart"></canvas>
        </div>
        <div class="chart-container chart-container--full">
          <canvas id="locChart"></canvas>
        </div>
      </div>
    </div>
  </section>

  <!-- Repo Breakdown -->
  <section class="section">
    <div class="container">
      <p class="section__label">Repositories</p>
      <h2 class="section__heading">Per-Repo Breakdown</h2>
      <div class="repo-breakdown" id="repoBreakdown"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p id="lastUpdated" style="color: var(--c-text-muted); font-size: 0.8rem; margin-bottom: 0.5rem;"></p>
        <p>&copy; 2026 Olly Cohen. Built with Claude.</p>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
  (async function () {
    var REPO_COLORS = {
      'apm-steam-mobile': '#6aad6a',
      'apm-steam-web': '#c8945a',
      'apm-steam-api': '#6a8aad',
      'apm-steam-azure-functions': '#ad6a8a'
    };
    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var data;
    try {
      var res = await fetch('/data/github-stats.json');
      if (!res.ok) throw new Error('not found');
      data = await res.json();
    } catch (e) {
      return;
    }

    renderCommitsChart(data);
    renderLocChart(data);
    renderRepoBreakdown(data);

    var d = new Date(data.generated_at);
    document.getElementById('lastUpdated').textContent =
      'Last updated ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    function getDates(data) {
      var dates = [];
      var cur = new Date(data.date_range.start + 'T00:00:00');
      var end = new Date(data.date_range.end + 'T00:00:00');
      while (cur <= end) {
        dates.push(cur.toISOString().split('T')[0]);
        cur.setDate(cur.getDate() + 1);
      }
      return dates;
    }

    function monthTickCallback(value, index) {
      var label = this.getLabelForValue(value);
      if (typeof label !== 'string') return null;
      var parts = label.split('-');
      if (parts.length < 3) return null;
      var day = parseInt(parts[2], 10);
      if (day !== 1) return null;
      var month = parseInt(parts[1], 10);
      var year = parts[0];
      if (month === 1) return year;
      return MONTHS[month - 1];
    }

    function xAxisConfig(stacked) {
      return {
        stacked: stacked || false,
        ticks: {
          autoSkip: false,
          maxRotation: 0,
          callback: monthTickCallback,
          color: function(ctx) {
            var label = ctx.tick && ctx.tick.label;
            return /^\d{4}$/.test(label) ? '#ece8df' : '#8a8477';
          },
          font: function(ctx) {
            var label = ctx.tick && ctx.tick.label;
            var isYear = /^\d{4}$/.test(label);
            return { size: isYear ? 13 : 11, weight: isYear ? 'bold' : 'normal', family: "'JetBrains Mono', monospace" };
          }
        },
        grid: { color: 'rgba(255,255,255,0.04)' }
      };
    }

    function chartOptions(title) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            labels: { color: '#8a8477', font: { family: "'JetBrains Mono', monospace", size: 11 }, boxWidth: 12 }
          },
          title: {
            display: true,
            text: title,
            color: '#ece8df',
            font: { family: "'JetBrains Mono', monospace", size: 13, weight: '400' },
            padding: { bottom: 12 }
          },
          tooltip: {
            backgroundColor: '#1a1f16',
            titleColor: '#ece8df',
            bodyColor: '#8a8477',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
            titleFont: { family: "'JetBrains Mono', monospace", size: 12 },
            bodyFont: { family: "'JetBrains Mono', monospace", size: 11 }
          }
        },
        scales: {
          x: xAxisConfig(),
          y: {
            ticks: { color: '#8a8477', font: { size: 11 } },
            grid: { color: 'rgba(255,255,255,0.04)' },
            beginAtZero: true
          }
        }
      };
    }

    function renderCommitsChart(data) {
      var dates = getDates(data);
      var commits = dates.map(function (d) { return data.daily[d] ? data.daily[d].commits : 0; });

      new Chart(document.getElementById('commitsChart'), {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: 'Commits',
            data: commits,
            borderColor: '#6aad6a',
            backgroundColor: 'rgba(106,173,106,0.08)',
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            pointHitRadius: 10,
            borderWidth: 2
          }]
        },
        options: chartOptions('Daily Commits')
      });
    }

    function renderLocChart(data) {
      var dates = getDates(data);
      var additions = dates.map(function (d) { return data.daily[d] ? data.daily[d].additions : 0; });
      var deletions = dates.map(function (d) { return data.daily[d] ? -(data.daily[d].deletions) : 0; });

      var opts = chartOptions('Daily Lines of Code');
      opts.scales.x = xAxisConfig(true);
      opts.scales.y = { stacked: true, ticks: { color: '#8a8477', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } };

      new Chart(document.getElementById('locChart'), {
        type: 'bar',
        data: {
          labels: dates,
          datasets: [
            {
              label: 'Additions',
              data: additions,
              backgroundColor: 'rgba(106,173,106,0.6)',
              borderColor: '#6aad6a',
              borderWidth: 1
            },
            {
              label: 'Deletions',
              data: deletions,
              backgroundColor: 'rgba(200,100,100,0.5)',
              borderColor: '#c86464',
              borderWidth: 1
            }
          ]
        },
        options: opts
      });
    }

    function renderRepoBreakdown(data) {
      var container = document.getElementById('repoBreakdown');
      var repos = Object.entries(data.by_repo).sort(function (a, b) { return b[1].commits - a[1].commits; });

      // Calculate days and months in range
      var start = new Date(data.date_range.start + 'T00:00:00');
      var end = new Date(data.date_range.end + 'T00:00:00');
      var totalDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) || 1;
      var totalMonths = ((end.getFullYear() - start.getFullYear()) * 12 + end.getMonth() - start.getMonth()) || 1;

      var maxRate = 0;
      repos.forEach(function(r) { var rate = r[1].commits / totalDays; if (rate > maxRate) maxRate = rate; });

      container.innerHTML = repos.map(function (entry) {
        var name = entry[0];
        var s = entry[1];
        var color = REPO_COLORS[name] || '#6aad6a';
        var commitsPerDay = (s.commits / totalDays).toFixed(1);
        var linesPerMonth = Math.round(s.additions / totalMonths).toLocaleString();
        var pct = Math.round((s.commits / totalDays) / maxRate * 100);
        return '<div class="repo-row">' +
          '<div class="repo-row__header">' +
          '<span class="repo-row__name" style="color:' + color + '">' + name + '</span>' +
          '<span class="repo-row__stats">' + commitsPerDay + ' commits/day &middot; ' + linesPerMonth + ' lines/mo</span>' +
          '</div>' +
          '<div class="repo-row__bar-bg">' +
          '<div class="repo-row__bar" style="width:' + pct + '%;background:' + color + '"></div>' +
          '</div></div>';
      }).join('');
    }
  })();
  </script>
</body>
</html>
